<button
	nbButton
	status="success"
	[preventDoubleSubmit]="approval.bind(this)"
	*ngIf="isApproval"
	size="small"
	class="req-green"
>
	{{ 'APPROVAL_REQUEST_PAGE.APPROVE' | translate }}
</button>
<button
	nbButton
	status="danger"
	[preventDoubleSubmit]="refuse.bind(this)"
	*ngIf="isRefuse"
	size="small"
	class="req-red"
>
	{{ 'APPROVAL_REQUEST_PAGE.REFUSE' | translate }}
</button>
