<button
	nbButton
	status="success"
	[preventDoubleSubmit]="approval.bind(this)"
	*ngIf="isApproval"
	class="mr-3"
	[size]="'tiny'"
>
	{{ 'EQUIPMENT_SHARING_PAGE.APPROVE' | translate }}
</button>
<button nbButton status="danger" [preventDoubleSubmit]="refuse.bind(this)" *ngIf="isRefuse" [size]="'tiny'">
	{{ 'EQUIPMENT_SHARING_PAGE.REFUSE' | translate }}
</button>
